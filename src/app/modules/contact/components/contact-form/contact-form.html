    <div class="p-12 lg:p-16 bg-white h-full">
      <form [formGroup]="form" (ngSubmit)="onSubmit.emit()" class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700 ml-1">Full Name</label>
            <input
              type="text"
              formControlName="name"
              placeholder="e.g. John Doe"
              class="w-full px-5 py-4 bg-slate-50 hover:bg-slate-100 border border-transparent rounded-2xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold text-slate-900 placeholder:text-slate-400"
            />
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold text-slate-700 ml-1">Email Address</label>
            <input
              type="email"
              formControlName="email"
              placeholder="john@example.com"
              class="w-full px-5 py-4 bg-slate-50 hover:bg-slate-100 border border-transparent rounded-2xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold text-slate-900 placeholder:text-slate-400"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-700 ml-1">Inquiry Type</label>
          <div class="relative">
            <select
              formControlName="subject"
              class="w-full px-5 py-4 bg-slate-50 hover:bg-slate-100 border border-transparent rounded-2xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold text-slate-900 appearance-none cursor-pointer"
            >
              <option value="" disabled>Select inquiry type</option>
              <option value="General Inquiry">General Inquiry</option>
              <option value="Appointment Support">Appointment Support</option>
              <option value="Technical Issue">Technical Issue</option>
              <option value="Role Request">Role/Permission Request</option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center px-5 pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-slate-700 ml-1">How can we help?</label>
          <textarea
            formControlName="message"
            rows="5"
            placeholder="Include details about your inquiry..."
            class="w-full px-5 py-4 bg-slate-50 hover:bg-slate-100 border border-transparent rounded-2xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold text-slate-900 placeholder:text-slate-400 resize-none"
          ></textarea>
        </div>

        <div class="pt-6">
          <button
            type="submit"
            [disabled]="isSubmitting || form.invalid"
            class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-[0.1em] hover:bg-primary hover:shadow-xl hover:shadow-primary/20 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
          >
            @if (isSubmitting) {
              <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              <span>Sending Message...</span>
            } @else {
              <span>Send Message</span>
            }
          </button>
        </div>
      </form>
    </div>
