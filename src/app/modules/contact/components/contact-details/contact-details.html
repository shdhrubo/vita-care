    <div class="bg-slate-900 p-12 lg:p-16 flex flex-col justify-between text-white relative overflow-hidden h-full">
      <div class="absolute top-0 right-0 w-64 h-64 bg-primary/20 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
      <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500/20 rounded-full blur-[80px] translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>

      <div class="relative z-10">
        <h3 class="text-3xl font-black tracking-tighter mb-2">Vita-Care Connect</h3>
        <p class="text-slate-400 font-medium mb-16 leading-relaxed">
          Direct access to our administrative and medical support teams.
        </p>

        <div class="space-y-10">
          @for (detail of details; track detail.label) {
            <div class="flex items-start gap-5">
              <div class="text-primary mt-1">
                <mat-icon [svgIcon]="detail.icon"></mat-icon>
              </div>
              <div>
                <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-1.5">
                  {{ detail.label }}
                </h4>
                <p class="text-xl font-bold text-white leading-tight mb-1">{{ detail.value }}</p>
                <p class="text-sm font-medium text-slate-500">{{ detail.subValue }}</p>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
