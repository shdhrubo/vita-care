<div
  class="flex flex-col md:flex-row h-[calc(100vh-64px)] overflow-hidden bg-slate-50 relative mt-16 w-full max-w-[1250px] mx-auto border-x border-border"
>
  <!-- Mobile Header Navigation -->
  <nav
    class="md:hidden flex overflow-x-auto bg-white border-b border-slate-100 p-2 gap-2 scrollbar-none sticky top-0 z-20"
  >
    <a
      routerLink="/dashboard/profile"
      routerLinkActive="bg-primary/10 text-primary border-primary"
      class="flex-shrink-0 px-4 py-2 text-xs font-black uppercase tracking-wider rounded-xl border border-transparent transition-all"
    >
      Profile
    </a>
    <a
      routerLink="/dashboard/appointments"
      routerLinkActive="bg-primary/10 text-primary border-primary"
      class="flex-shrink-0 px-4 py-2 text-xs font-black uppercase tracking-wider rounded-xl border border-transparent transition-all"
    >
      Appointments
    </a>
    @if (isStaff$ | async) {
      <a
        routerLink="/dashboard/all-appointments"
        routerLinkActive="bg-primary/10 text-primary border-primary"
        class="flex-shrink-0 px-4 py-2 text-xs font-black uppercase tracking-wider rounded-xl border border-transparent transition-all"
      >
        All Appointments
      </a>
    }
  </nav>

  <!-- Desktop Sidebar -->
  <aside class="w-64 border-r border-slate-200 bg-white hidden md:flex flex-col h-full shadow-sm">
    <div class="px-6 py-6 mb-2">
      <h3
        class="text-xs font-black uppercase text-slate-400 tracking-widest border-b border-slate-100 pb-3"
      >
        Patient Portal
      </h3>
    </div>
    <!-- Profile Option -->
    <a
      routerLink="/dashboard/profile"
      routerLinkActive="bg-primary/10 text-primary border-r-4 border-primary"
      class="px-6 py-4 flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-colors font-semibold"
    >
      <mat-icon svgIcon="platform_solid:user"></mat-icon>
      My Profile
    </a>
    <!-- Appointments Option -->
    <a
      routerLink="/dashboard/appointments"
      routerLinkActive="bg-primary/10 text-primary border-r-4 border-primary"
      class="px-6 py-4 flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-colors font-semibold"
    >
      <mat-icon svgIcon="platform_solid:calendar"></mat-icon>
      My Appointments
    </a>

    <!-- Staff/Admin Center Link -->
    @if (isStaff$ | async) {
      <div class="px-6 py-6 mt-4 mb-2">
        <h3
          class="text-xs font-black uppercase text-indigo-400 tracking-widest border-b border-slate-100 pb-3"
        >
          Staff Management
        </h3>
      </div>
      <a
        routerLink="/dashboard/all-appointments"
        routerLinkActive="bg-primary/10 text-primary border-primary border-r-4"
        class="px-6 py-4 flex items-center gap-3 text-slate-600 hover:bg-slate-50 transition-colors font-semibold"
      >
        <mat-icon svgIcon="platform_solid:building"></mat-icon>
        All Appointments
      </a>
    }
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto w-full p-4 lg:p-8">
    <router-outlet></router-outlet>
  </main>
</div>
