<div class="px-6 py-10 max-w-2xl mx-auto">
  @if (user$ | async; as user) {
    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-8">
      <h2 class="text-2xl font-black text-slate-900 mb-8 border-b border-slate-50 pb-4">My Account</h2>
      
      <div class="space-y-6">
        <!-- Name Section -->
        <div>
          <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1 block">Full Name</label>
          <p class="text-lg font-bold text-slate-800">{{ user.Name }}</p>
        </div>

        <!-- Email Section -->
        <div>
          <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1 block">Email Address</label>
          <p class="text-lg font-bold text-slate-800">{{ user.Email }}</p>
        </div>

        <!-- Roles Section -->
        <div>
          <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block">Account Roles</label>
          <div class="flex flex-wrap gap-2">
            @for (role of user.Roles; track role) {
              <span class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg border border-slate-100/50 text-xs font-black uppercase tracking-wide">
                {{ role }}
              </span>
            } @empty {
              <p class="text-slate-400 text-sm font-medium italic">No roles assigned</p>
            }
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="text-center py-20 text-slate-400">
      <p class="text-sm font-black uppercase tracking-widest animate-pulse">Loading profile data...</p>
    </div>
  }
</div>
