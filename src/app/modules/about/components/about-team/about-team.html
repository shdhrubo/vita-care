    <div class="space-y-6 pb-20">
      <h2 class="text-xl font-black text-slate-900 uppercase tracking-widest pl-2">
        Executive Leadership
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (member of team; track member.name) {
          <div class="bg-white border border-slate-200 rounded-[8px] overflow-hidden group hover:shadow-xl transition-all duration-300">
            <div class="aspect-square relative grayscale group-hover:grayscale-0 transition-all duration-500">
              <img [src]="member.image" [alt]="member.name" class="w-full h-full object-cover" />
            </div>
            <div class="p-6">
              <h3 class="font-black text-slate-900 text-lg leading-tight">{{ member.name }}</h3>
              <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">
                {{ member.role }}
              </p>
              <div class="text-[10px] text-primary font-bold mt-4 uppercase tracking-tighter">
                {{ member.specialty }}
              </div>
            </div>
          </div>
        }
      </div>
    </div>
