<div
  (click)="onClick()"
  class="service-card cursor-pointer group h-full"
  [ngClass]="{ active: isActive }"
>
  <div
    class="card-inner relative overflow-hidden h-full bg-white border border-slate-200 rounded-[2.5rem] p-8 transition-all duration-300 group-hover:border-primary/20 group-hover:shadow-2xl group-hover:shadow-primary/10 hover:-translate-y-2"
  >
    <!-- BG Accent -->
    <div
      class="absolute -top-12 -right-12 w-32 h-32 opacity-0 group-hover:opacity-100 transition-all duration-700 blur-2xl"
      [ngClass]="{
        'bg-primary/20': category.Color === 'primary',
        'bg-amber-400/20': category.Color === 'amber',
        'bg-rose-400/20': category.Color === 'rose',
      }"
    ></div>

    <div class="flex flex-col h-full space-y-6 relative">
      <!-- Icon Box -->
      <div
        class="text-white! w-16 h-16 rounded-2xl flex items-center justify-center transition-all duration-500 group-hover:scale-110 group-hover:rotate-3 shadow-lg"
        [ngClass]="{
          'bg-primary shadow-primary/20': category.Color === 'primary',
          'bg-amber-400 shadow-amber-400/20': category.Color === 'amber',
          'bg-rose-400 shadow-rose-400/20': category.Color === 'rose',
        }"
      >
        <mat-icon class="w-8! h-8!" [svgIcon]="category.Icon"></mat-icon>
      </div>

      <div class="space-y-3">
        <h3 class="text-2xl font-black text-slate-900 leading-tight">
          {{ category.Title }}
        </h3>
        <p class="text-slate-500 font-medium leading-relaxed text-sm">
          {{ category.Description }}
        </p>
      </div>

      <div class="mt-auto pt-4 flex items-center gap-3">
        <span
          class="text-sm font-black transition-colors"
          [ngClass]="{
            'text-primary': category.Color === 'primary',
            'text-amber-500': category.Color === 'amber',
            'text-rose-500': category.Color === 'rose',
          }"
        >
          Explore Service
        </span>
        <mat-icon
          class="w-4! h-4! transition-transform group-hover:translate-x-1"
          svgIcon="platform_solid:chevron-right"
          [ngClass]="{
            'text-primary': category.Color === 'primary',
            'text-amber-500': category.Color === 'amber',
            'text-rose-500': category.Color === 'rose',
          }"
        ></mat-icon>
      </div>
    </div>
  </div>
</div>
