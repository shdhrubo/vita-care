<div class="p-6 bg-white relative">
  <div class="sm:flex sm:items-start">
    <div class="text-center sm:text-left w-full">
      <h3 class="text-lg font-semibold leading-6 text-slate-900" id="modal-title">
        {{ data.title }}
      </h3>
      <div class="mt-2 text-sm text-slate-600 font-medium">
         {{ data.message }}
      </div>
    </div>
  </div>
  <div class="mt-8 sm:mt-6 sm:flex sm:flex-row-reverse gap-3">
    <button
      type="button"
      class="inline-flex w-full justify-center rounded-xl px-4 py-2 text-sm font-semibold text-white shadow-sm sm:w-auto transition-colors focus:ring-2 focus:ring-offset-2 focus:outline-none"
      [ngClass]="getConfirmBtnClass()"
      (click)="onConfirm()"
    >
      {{ data.confirmLabel || 'Confirm' }}
    </button>
    <button
      type="button"
      class="mt-3 inline-flex w-full justify-center rounded-xl bg-white px-4 py-2 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 sm:mt-0 sm:w-auto transition-colors focus:ring-2 focus:ring-slate-200 focus:outline-none focus:ring-offset-2"
      (click)="onCancel()"
    >
      {{ data.cancelLabel || 'Cancel' }}
    </button>
  </div>
</div>
